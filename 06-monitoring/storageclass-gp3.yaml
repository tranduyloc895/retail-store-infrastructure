# ============================================================
# StorageClass gp3 — default cho cluster
# ------------------------------------------------------------
# Dùng CSI provisioner (ebs.csi.aws.com) thay cho in-tree legacy.
# Đánh dấu default qua annotation để PVC không khai báo
# storageClassName vẫn hoạt động.
# ============================================================
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: ebs.csi.aws.com
volumeBindingMode: WaitForFirstConsumer   # Đợi pod schedule rồi mới tạo volume đúng AZ
allowVolumeExpansion: true                # Cho phép resize PVC sau này
reclaimPolicy: Delete                     # Xóa PVC → xóa volume (tiết kiệm cost)
parameters:
  type: gp3
  fsType: ext4
  encrypted: "true"                        # Mã hóa at-rest (best practice)
